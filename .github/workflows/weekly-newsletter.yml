name: Weekly Strongsville Newsletter

on:
  schedule:
    # Runs every Friday at 8:00 AM US Eastern (12:00 UTC covers EST;
    # adjust if you want to account for daylight saving precisely)
    - cron: "0 12 * * 5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
        run: python -u newsletter_generator.py

      - name: Upload issue as artifact (for review)
        uses: actions/upload-artifact@v4
        with:
          name: latest-issue
          path: latest_issue.html
